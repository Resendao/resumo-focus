name: Copom — Índice de Tom

# Atas do Copom são publicadas na terça-feira seguinte à reunião, 8h BRT.
# Roda toda terça 9h BRT: nas semanas sem ata nova o pipeline é idempotente
# (tudo vem de cache, nenhuma chamada externa, nenhum commit).
#
# Scorer oficial: CLAUDE via claude-code-action, usando o comando
# .claude/commands/pontuar-atas.md (o mesmo prompt do scoring histórico).
# Autenticação: secret CLAUDE_CODE_OAUTH_TOKEN (assinatura Claude —
# gere com `claude setup-token`) OU ANTHROPIC_API_KEY (créditos de API).
# Sem nenhum dos dois, a ata nova fica pendente (registrada em logs/erros.md)
# e pode ser pontuada localmente com /pontuar-atas — o job não falha.

on:
  schedule:
    - cron: "0 12 * * 2"   # terças 12h UTC (9h BRT)
  workflow_dispatch:        # disparo manual pelo GitHub
  push:                     # TEMPORÁRIO: verificação do fix de CI — remover

permissions:
  contents: write

concurrency:
  group: pipelines-bcb      # nunca em paralelo com o pipeline do Focus
  cancel-in-progress: false

jobs:
  indice-tom:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # numpy==1.26.4 (e outros pins) não têm wheel para o Python 3.13,
      # padrão atual do ubuntu-latest — fixar 3.12 até atualizar os pins.
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Detectar atas sem score Claude
        id: detecta
        run: |
          set +e
          PEND=$(python scripts/atualizar_tom.py --detectar 2> detect_stderr.log)
          CODE=$?
          cat detect_stderr.log
          if [ $CODE -ne 0 ]; then
            # TEMPORÁRIO (diagnóstico): commita o stderr p/ inspeção sem auth
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -f detect_stderr.log
            git commit -m "debug: stderr do --detectar (TEMPORARIO, remover)"
            git pull --rebase origin main && git push
            exit $CODE
          fi
          rm -f detect_stderr.log
          echo "pendentes=$PEND" >> "$GITHUB_OUTPUT"
          echo "Atas pendentes de score: ${PEND:-nenhuma}"

      - name: Verificar autenticação Claude disponível
        id: auth
        env:
          OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          APIKEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$OAUTH" ] || [ -n "$APIKEY" ]; then
            echo "tem=true" >> "$GITHUB_OUTPUT"
          else
            echo "tem=false" >> "$GITHUB_OUTPUT"
            echo "Sem CLAUDE_CODE_OAUTH_TOKEN/ANTHROPIC_API_KEY — scoring fica para o /pontuar-atas local."
          fi

      - name: Pontuar atas novas com o Claude
        if: steps.detecta.outputs.pendentes != '' && steps.auth.outputs.tem == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Execute o comando .claude/commands/pontuar-atas.md deste repositório:
            pontue as atas pendentes (${{ steps.detecta.outputs.pendentes }})
            seguindo exatamente a rubrica do arquivo e atualize
            output/scores/scores_claude_cache.csv. NÃO commite — o commit é
            feito por um passo posterior do workflow.
          claude_args: "--allowedTools Bash,Read,Write,Edit,Glob,Grep"

      - name: Consolidar, recalibrar e regenerar contexto
        run: python scripts/atualizar_tom.py

      - name: Commitar arquivos gerados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add atas_cache.json data/raw/*.txt selic_cache.json \
                  data/focus_expectativas_raw.csv data/contexto-tom.md \
                  output/scores/*.csv output/focus/expectativas_reunioes.csv \
                  logs/erros.md
          git diff --cached --quiet || git commit -m "Tom Copom $(date -u +%Y-%m-%d): atualização automática"
          git pull --rebase origin main
          git push
