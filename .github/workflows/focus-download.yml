name: Focus — Pipeline semanal

on:
  schedule:
    - cron: "30 14 * * 1"   # toda segunda às 14h30 UTC (11h30 BRT — após publicação BCB)
  workflow_dispatch:          # disparo manual pelo GitHub
  push:                       # TEMPORÁRIO: verificação do fix do Python — remover
    paths: [".github/workflows/focus-download.yml"]

permissions:
  contents: write

concurrency:
  group: pipelines-bcb      # nunca em paralelo com o pipeline do Índice de Tom
  cancel-in-progress: false

jobs:
  focus-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # numpy==1.26.4 (e outros pins) não têm wheel para o Python 3.13,
      # padrão atual do ubuntu-latest — fixar 3.12 até atualizar os pins.
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Baixar PDF do Focus
        # forcar=False: pula se o arquivo já existir no repo (idempotente)
        run: python src/baixar_focus.py

      - name: Extrair texto do PDF
        run: python src/extrair_texto.py

      - name: Gerar contexto-focus.md (OData BCB)
        # Não copia para hub-agentes no CI (pasta local não existe no runner)
        # O arquivo fica em data/contexto-focus.md e é commitado junto.
        # continue-on-error: o olinda já retornou 403 em ambiente automatizado
        # (logs/erros.md 2026-07-01) — PDF/txt/expectativas seguem mesmo assim.
        continue-on-error: true
        run: python src/gerar_contexto_focus.py

      - name: Atualizar expectativas Focus (OData → cache versionado)
        # Falha do OData não derruba o job: coletar_expectativas cai para o
        # cache data/focus_expectativas_raw.csv commitado no repositório.
        run: python src/coletar_expectativas.py

      - name: Commitar arquivos gerados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/focus_*.pdf data/focus_*.txt data/focus_*.html data/contexto-focus.md \
                  data/focus_expectativas_raw.csv output/focus/expectativas_reunioes.csv \
                  logs/erros.md
          git diff --cached --quiet || git commit -m "Focus $(date -u +%Y-%m-%d): PDF + txt + contexto + expectativas"
          git pull --rebase origin main
          git push
